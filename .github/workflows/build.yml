name: Build Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://github.com/${{ github.repository }}.git
          git checkout -B build

      - name: Create placeholder js file
        run: |
          mkdir -p dist
          touch dist/ex124oj.user.js
          git add -f dist/ex124oj.user.js
          git diff --cached --quiet || git commit -m "User script generating prepared"

      - name: Build production js file
        run: |
          npm run build
          git add -f dist/ex124oj.user.js
          git diff --cached --quiet || git commit -m "User script generating completed"

      - name: Push to GitHub
        run: |
          git push -f origin build